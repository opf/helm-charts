---
apiVersion: "v1"
kind: "Pod"
metadata:
  name: "{{ include "common.names.fullname" . }}-test-connection"
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: test-connection
  annotations:
    "helm.sh/hook": test
spec:
  serviceAccountName: {{ include "common.names.fullname" . }}
  containers:
    - name: "wget"
      image: "busybox"
      imagePullPolicy: Always
      command: ['wget']
      args:
        - '--no-verbose'
        - '--tries=1'
        - '--spider'
        - '{{ include "common.names.fullname" . }}:{{ .Values.service.ports.http.port }}/health_check'
      {{- if (coalesce .Values.testconnection.resources .Values.resources) }}
      resources:
        {{- coalesce .Values.testconnection.resources .Values.resources | toYaml | nindent 12 }}
      {{- else if ne (coalesce .Values.testconnection.resourcesPreset .Values.resourcesPreset) "none" }}
      resources:
        {{- include "common.resources.preset" (dict "type" (coalesce .Values.testconnection.resourcesPreset .Values.resourcesPreset)) | nindent 12 }}
      {{- end }}
  restartPolicy: "Never"
...
