# Only generate this secret if
#   a) backup is enabled
# and if
#   b) no kopia password is configured directly
# and if
#   c) no existing secret is referenced
# and if
#   d) this auto-generated secret does not exist yet.
{{-
  if and
    .Values.backup.enabled
    (not .Values.backup.kopiaPassword)
    (not .Values.backup.existingSecret)
    (not (lookup "v1" "Secret" .Release.Namespace "backup-kopia-password-auto-generated"))
}}
---
apiVersion: v1
kind: Secret
metadata:
  name: backup-kopia-password-auto-generated
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: backup
  annotations:
    # This annotation together with the lookup above ensures the password is not
    # regenerated on each upgrade — only created once and then kept.
    "helm.sh/resource-policy": "keep"
    {{- if .Values.commonAnnotations }}
      {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
    {{- end }}
data: # reset data to make sure only keys defined below remain
stringData:
  kopiaPassword: {{ randAlphaNum 32 | quote }}
...
{{- end }}
