apisixInitialConfig:
  enabled: true
  route:
    provider: openai-compatible
    apiKey: ""
    baseURL: "" # ignored if vllm is enabled

  consumers:
    consumerA:
      apiKey: "sk-client-v1-abcdef123456"
    # you can define multiple consumers
    # consumer_B:
    #  apiKey: "sk-client-v1-xyz987654321"

apisix:
  apisix:
    deployment:
      mode: standalone
      role: traditional
      role_traditional:
        config_provider: yaml
    admin:
      credentials:
        admin: "admin-key"
      allow:
        ipList:
          - 10.42.0.0/16 # other pods
    prometheus:
      enabled: true
  etcd:
    enabled: false
  metrics:
    serviceMonitor:
      enabled: false
  ingress:
    enabled: false


vllm:
  enabled: false
  image:
    name: "vllm/vllm-openai"
    tag: "v0.23.0-ubuntu2404"
    pullPolicy: "IfNotPresent"
  replicaCount: 1
  service:
    # Do not name this service simply "vllm" as kubernetes env variables it will clash with vllm ones.
    name: vllm-service
    type: ClusterIP
    port: 8000
    annotations: {}
  model: Qwen/Qwen3.6-35B-A3B-FP8
  extraArgs:
    - "--reasoning-parser"
    - "qwen3"
  # Environment variables (e.g., HF_TOKEN for private models, huggingface hub configurations)
  env: []
    # - name: HF_TOKEN
    #   value: "your_huggingface_token_here"
  # Resources request/limit including GPUs
  resources:
    limits:
      cpu: "4"
      memory: "64Gi"
      nvidia.com/gpu: "1"
    requests:
      cpu: "4"
      memory: "64Gi"
      nvidia.com/gpu: "1"
  # Persistence settings to cache HuggingFace/Model files locally
  persistence:
    enabled: false
    size: "50Gi"
    accessModes:
      - ReadWriteOnce
    # storageClass: ""
    # existingClaim: ""
  # Node scheduling and placement configs
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  livenessProbe:
    enabled: true
    initialDelaySeconds: 240
  readinessProbe:
    enabled: true
    initialDelaySeconds: 240