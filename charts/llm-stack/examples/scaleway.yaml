apisixInitialConfig:
  enabled: true
  route:
    provider: openai-compatible
    # retrieve the project id from the scaleway project dashboard
    baseURL: "https://api.scaleway.ai/<project_id>/v1/chat/completions" # ignored if vllm is enabled
    models:
      - name: qwen3.6-35b-a3b
        provider: scaleway
      - name: gemma-4-26b-a4b-it
        provider: scaleway

apisix:
  metrics:
    serviceMonitor:
      enabled: true
  ingress:
    enabled: true
    hosts:
      - host: llm-stack.localhost
        paths:
          - /v1/chat/completions
          - /v1/models

vllm:
  enabled: false


devMonitoring:
  enabled: true
