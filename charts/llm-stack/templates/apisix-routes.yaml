apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-gateway-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: ai-cluster-gateway
  rules:
    - matches:
        - path: { type: PathPrefix, value: /v1 }
      filters:
        - type: ExtensionRef
          extensionRef:
            group: apisix.apache.org
            kind: ApisixPluginConfig
            name: ai-proxy-config
      backendRefs:
        - name: {{ printf "%s-apisix" .Release.Name }}
          port: 9080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: ai-cluster-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: {{ printf "%s-grafana" .Release.Name }}
          port: 80